<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <nav class="bg-white p-4 px-10 border-b">
        <h1 class="text-xl font-black">BookTracker</h1>
    </nav>

    <main class="max-w-4xl mx-auto p-10">
        <a href="/library" class="text-gray-400 hover:text-black mb-8 inline-block">← Volver</a>
        
        <div id="detailView" class="flex flex-col md:flex-row gap-12">
            </div>
    </main>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        async function load() {
            const res = await fetch(`/api/books/${id}`);
            const b = await res.json();
            
            document.getElementById('detailView').innerHTML = `
                <div class="md:w-1/3">
                    <img src="${b.thumbnail || 'https://via.placeholder.com/300x450'}" class="w-full rounded-2xl shadow-xl">
                </div>
                <div class="md:w-2/3">
                    <h2 class="text-4xl font-bold mb-1">${b.title}</h2>
                    <p class="text-xl text-gray-400 mb-6">${b.author}</p>
                    <div class="flex gap-2 mb-8">
         <span class="bg-gray-200 px-3 py-1 rounded text-xs font-bold">${b.publisher || 'N/A'}</span>
<span class="bg-gray-200 px-3 py-1 rounded text-xs font-bold">${b.published_date || b.publishedDate || 'N/A'}</span>
<span class="bg-gray-200 px-3 py-1 rounded text-xs font-bold">${b.page_count || b.pageCount || 0} pág.</span>
                    </div>
                    <hr class="mb-8">
                    <div class="prose text-gray-700 mb-10 leading-relaxed">${b.description}</div>
                    <p class="text-xs text-gray-400 mb-6 uppercase tracking-widest">Agregado el ${new Date(b.added_at).toLocaleString()}</p>
                    <button onclick="del()" class="bg-red-50 text-red-600 px-8 py-3 rounded-xl font-bold border border-red-100 hover:bg-red-600 hover:text-white transition">Eliminar de mi biblioteca</button>
                </div>
            `;
        }

        async function del() {
            if(confirm("¿Eliminar este libro?")) {
                await fetch(`/api/books/${id}`, { method: 'DELETE' });
                location.href = '/library';
            }
        }
        load();
    </script>
</body>
</html>
