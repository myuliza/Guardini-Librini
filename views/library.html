<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Biblioteca - BookTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold tracking-tighter text-gray-900">Guardini Librini</h1>
        <a href="/" class="text-gray-500 hover:text-black transition">← Buscar más libros</a>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h2 class="text-4xl font-black text-gray-900 mb-2">Librini Guardadini</h2>
                <p class="text-gray-500">Tienes <span id="bookCount" class="font-bold text-black text-lg">0</span> libros guardados.</p>
            </div>
        </header>

        <div class="bg-white p-2 rounded-2xl border shadow-sm flex flex-col md:flex-row gap-2 mb-10">
            <input type="text" id="libSearch" oninput="fetchLibrary()" placeholder="Título o autor..." 
                class="flex-1 p-3 bg-transparent outline-none text-gray-700">
            
            <select id="libTag" onchange="fetchLibrary()" 
                class="bg-gray-50 p-3 rounded-xl outline-none text-sm border-none w-full md:w-48 font-medium cursor-pointer">
                <option value="">Todos los temas</option>
            </select>
            
            <select id="libSort" onchange="fetchLibrary()" 
                class="bg-gray-100 p-3 rounded-xl outline-none font-bold text-sm cursor-pointer">
                <option value="date_desc">Recientes</option>
                <option value="date_asc">Antiguos</option>
                <option value="title_asc">A-Z</option>
                <option value="title_desc">Z-A</option>
            </select>
        </div>

        <div id="libGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>

        <div id="emptyMsg" class="hidden text-center py-20">
            <p class="text-gray-400 text-lg">No se encontraron libros en esta categoría.</p>
        </div>
    </main>

    <script>
        // Variable para no refrescar la lista de temas mientras el usuario filtra
        let tagsLoaded = false;

        async function fetchLibrary() {
            const s = document.getElementById('libSearch').value;
            const tag = document.getElementById('libTag').value;
            const sort = document.getElementById('libSort').value;
            const grid = document.getElementById('libGrid');
            const emptyMsg = document.getElementById('emptyMsg');
            const countSpan = document.getElementById('bookCount');

            try {
                const res = await fetch(`/api/books?search=${encodeURIComponent(s)}&tag=${encodeURIComponent(tag)}&sort=${sort}`);
                const books = await res.json();

                // 1. ACTUALIZAR CONTADOR
                countSpan.innerText = books.length;

                // 2. LLENAR EL SELECT DE TEMAS (solo la primera vez o cuando no haya filtros)
                if (!tagsLoaded || (!s && !tag)) {
                    updateTagDropdown(books);
                }

                if (books.length === 0) {
                    grid.innerHTML = '';
                    emptyMsg.classList.remove('hidden');
                    return;
                }

                emptyMsg.classList.add('hidden');
                grid.innerHTML = books.map(b => `
                    <div class="bg-white rounded-2xl overflow-hidden border border-gray-100 group relative shadow-sm hover:shadow-xl transition-all duration-300 cursor-pointer"
                         onclick="window.location.href='/books/detail?id=${b.id}'">
                        <div class="relative aspect-[3/4] overflow-hidden bg-gray-100">
                            <img src="${b.thumbnail || 'https://via.placeholder.com/300x450?text=Sin+Portada'}" class="w-full h-full object-cover">
                            <div class="absolute top-2 left-2 bg-black/70 backdrop-blur-md text-white text-[8px] px-2 py-1 rounded font-bold uppercase tracking-tighter">
                                ${b.categories || 'General'}
                            </div>
                            <div class="opacity-0 group-hover:opacity-100 absolute inset-0 bg-black/20 flex items-center justify-center transition-opacity">
                                <button onclick="event.stopPropagation(); deleteBook(${b.id})" 
                                    class="bg-white text-red-600 p-3 rounded-full hover:bg-red-600 hover:text-white transition-colors shadow-xl">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                </button>
                            </div>
                        </div>
                        <div class="p-4">
                            <h4 class="font-bold text-sm text-gray-900 truncate">${b.title}</h4>
                            <p class="text-gray-400 text-[10px] uppercase font-bold tracking-widest mt-1">${b.author}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error cargando biblioteca:", err);
            }
        }

        // FUNCIÓN PARA LLENAR EL SELECT DE TEMAS CON LOS LIBROS EXISTENTES
        function updateTagDropdown(books) {
            const tagSelect = document.getElementById('libTag');
            const selectedValue = tagSelect.value; // Guardar lo que el usuario eligió
            
            const allCategories = new Set();
            books.forEach(b => {
                if (b.categories) {
                    // Dividir por coma si hay varias categorías (ej: "Ficción, Magia")
                    b.categories.split(',').forEach(cat => allCategories.add(cat.trim()));
                }
            });

            // Limpiar pero mantener la opción por defecto
            tagSelect.innerHTML = '<option value="">Todos los temas</option>';
            
            // Ordenar y añadir las categorías encontradas
            Array.from(allCategories).sort().forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = cat;
                if (cat === selectedValue) opt.selected = true;
                tagSelect.appendChild(opt);
            });

            tagsLoaded = true;
        }

        async function deleteBook(id) {
            if (!confirm("¿Eliminar este libro?")) return;
            try {
                const res = await fetch(`/api/books/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    tagsLoaded = false; // Permitir que los temas se actualicen al borrar
                    fetchLibrary();
                }
            } catch (err) {
                alert("No se pudo eliminar.");
            }
        }

        window.onload = fetchLibrary;
    </script>
</body>
</html>
